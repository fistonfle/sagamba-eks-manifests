# Auth Service - EKS deployment. Service name "auth-service" matches Eureka/gateway lb://auth-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sagamba
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/fistonfle/sagamba-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SERVER_PORT
              value: "8001"
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_HOST
            - name: EUREKA_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_NAME
            - name: DB_MAX_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_MAX_POOL_SIZE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_VIRTUAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_VIRTUAL_HOST
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: REDIS_PASSWORD
            # SMTP / Email (auth-service: OTP, password reset, verification)
            - name: MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: MAIL_HOST
            - name: MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: MAIL_PORT
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: MAIL_USERNAME
                  optional: true
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: MAIL_PASSWORD
                  optional: true
            - name: MAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: MAIL_FROM
            - name: MAIL_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: MAIL_FROM_NAME
            - name: MAIL_NOTIFICATIONS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: MAIL_NOTIFICATIONS_ENABLED
            - name: SMTP_AUTH
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: SMTP_AUTH
            - name: SMTP_STARTTLS
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: SMTP_STARTTLS
            - name: PASSWORD_RESET_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: PASSWORD_RESET_BASE_URL
            - name: VERIFICATION_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: VERIFICATION_BASE_URL
            - name: DEFAULT_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DEFAULT_EMAIL
            - name: ALWAYS_USE_DEFAULT_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: ALWAYS_USE_DEFAULT_EMAIL
            - name: REQUIRE_OTP_FOR_LOGIN
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: REQUIRE_OTP_FOR_LOGIN
            - name: INITIAL_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: INITIAL_ADMIN_USERNAME
            - name: INITIAL_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: INITIAL_ADMIN_EMAIL
            - name: INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: INITIAL_ADMIN_PASSWORD
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8001
            initialDelaySeconds: 90
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sagamba
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: sagamba
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
