apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sagamba
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fistonfle/sagamba-eks-manifests
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: sagamba
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  # Health assessment
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
