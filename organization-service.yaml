# Organization Service - EKS. Service name "sagamba-organization-service" must match gateway lb://sagamba-organization-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: organization-service
  namespace: sagamba
  labels:
    app: organization-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: organization-service
  template:
    metadata:
      labels:
        app: organization-service
    spec:
      containers:
        - name: organization-service
          image: ghcr.io/fistonfle/sagamba-organization-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SERVER_PORT
              value: "8002"
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_HOST
            - name: EUREKA_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_NAME
            - name: DB_MAX_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_MAX_POOL_SIZE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_VIRTUAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_VIRTUAL_HOST
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: JWT_SECRET
            - name: EUREKA_PREFER_IP_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_PREFER_IP_ADDRESS
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8002
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8002
            initialDelaySeconds: 45
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: sagamba-organization-service
  namespace: sagamba
spec:
  selector:
    app: organization-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: organization-service-hpa
  namespace: sagamba
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: organization-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
