# Beneficiary Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beneficiary-service
  namespace: sagamba
  labels:
    app: beneficiary-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: beneficiary-service
  template:
    metadata:
      labels:
        app: beneficiary-service
    spec:
      containers:
        - name: beneficiary-service
          image: ghcr.io/fistonfle/sagamba-beneficiary-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SERVER_PORT
              value: "8003"
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_HOST
            - name: EUREKA_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_VIRTUAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_VIRTUAL_HOST
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_PASSWORD
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8003
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8003
            initialDelaySeconds: 45
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: beneficiary-service
  namespace: sagamba
spec:
  selector:
    app: beneficiary-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: beneficiary-service-hpa
  namespace: sagamba
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: beneficiary-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
