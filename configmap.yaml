apiVersion: v1
kind: ConfigMap
metadata:
  name: sagamba-config
  namespace: sagamba
  labels:
    app.kubernetes.io/part-of: sagamba
data:
  # Database (used by services that reference sagamba-config)
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "sagamba_db"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "sagamba_db"
  # Limit connections per service so total stays under Postgres max_connections (default 100)
  DB_MAX_POOL_SIZE: "8"
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_TIMEOUT: "6000"
  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VIRTUAL_HOST: "/sagamba"
  # Eureka
  EUREKA_HOST: "service-registry-service"
  EUREKA_PORT: "8761"
  # Use IP for instance registration so gateway can resolve (pod hostnames don't resolve across pods)
  EUREKA_PREFER_IP_ADDRESS: "true"
  # Profile for K8s (override per deployment if needed)
  SPRING_PROFILES_ACTIVE: "kubernetes"
  # --- Auth service: SMTP / Email (non-sensitive). Sensitive: MAIL_USERNAME, MAIL_PASSWORD in sagamba-secrets ---
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_FROM: "saveservegroup@gmail.com"
  MAIL_FROM_NAME: "noreply"
  MAIL_NOTIFICATIONS_ENABLED: "true"
  SMTP_AUTH: "true"
  SMTP_STARTTLS: "true"
  # URLs in password-reset and verification emails (use your frontend URL)
  PASSWORD_RESET_BASE_URL: "https://sagamba.savetoserve.rw"
  VERIFICATION_BASE_URL: "https://sagamba.savetoserve.rw"
  # Redirect all notification emails to this address when set (optional)
  DEFAULT_EMAIL: "fistonfle04@gmail.com"
  ALWAYS_USE_DEFAULT_EMAIL: "true"
  REQUIRE_OTP_FOR_LOGIN: "true"
  # CORS: allow frontend and Swagger UI origins (comma-separated)
  CORS_ALLOWED_ORIGINS: "https://sagamba.savetoserve.rw,https://sagambaapi.savetoserve.rw,http://localhost:3000,http://localhost:3001"
  # Swagger/OpenAPI base URL (services that expose api-docs)
  PUBLIC_API_URL: "https://sagambaapi.savetoserve.rw"
