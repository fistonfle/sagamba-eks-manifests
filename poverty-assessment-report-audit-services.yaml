# Poverty Service (8008), Assessment (8009), Report (8010), Audit (8011)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poverty-service
  namespace: sagamba
  labels:
    app: poverty-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poverty-service
  template:
    metadata:
      labels:
        app: poverty-service
    spec:
      containers:
        - name: poverty-service
          image: ghcr.io/fistonfle/sagamba-poverty-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8008
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SERVER_PORT
              value: "8008"
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_HOST
            - name: EUREKA_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_PORT
            - name: EUREKA_PREFER_IP_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: EUREKA_PREFER_IP_ADDRESS
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_NAME
            - name: DB_MAX_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: DB_MAX_POOL_SIZE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_VIRTUAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: sagamba-config
                  key: RABBITMQ_VIRTUAL_HOST
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sagamba-secrets
                  key: RABBITMQ_PASSWORD
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8008
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8008
            initialDelaySeconds: 45
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: poverty-service
  namespace: sagamba
spec:
  selector:
    app: poverty-service
  ports:
    - port: 8008
      targetPort: 8008
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: poverty-service-hpa
  namespace: sagamba
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: poverty-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
