# AWS EKS Ingress - uses AWS Load Balancer Controller to create an ALB.
# Prerequisites: Install AWS Load Balancer Controller in the cluster.
# Replace YOUR_DOMAIN and YOUR_ACME_ARN if using TLS with ACM.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sagamba-ingress
  namespace: sagamba
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # cert-manager annotations for automatic HTTPS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sagamba.savetoserve.rw
    - sagambaapi.savetoserve.rw
    secretName: sagamba-tls-cert
  rules:
    # API Gateway - backend for /api and /actuator
    - host: sagambaapi.savetoserve.rw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 80
    # Frontend
    - host: sagamba.savetoserve.rw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sagamba-frontend
                port:
                  number: 80
  # Optional: single hostname with path-based routing
  # rules:
  #   - host: sagamba.example.com
  #     http:
  #       paths:
  #         - path: /api
  #           pathType: Prefix
  #           backend:
  #             service:
  #               name: api-gateway-service
  #               port:
  #                 number: 80
  #         - path: /
  #           pathType: Prefix
  #           backend:
  #             service:
  #               name: sagamba-frontend
  #               port:
  #                 number: 80
